name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          DEMO_USERNAME: ${{ secrets.DEMO_USERNAME }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
        run: |
          set -euo pipefail
          : "${BACKEND_URL:?BACKEND_URL secret is required}"
          : "${DEMO_USERNAME:?DEMO_USERNAME secret is required}"
          : "${DEMO_PASSWORD:?DEMO_PASSWORD secret is required}"
          cat > local.properties <<EOF
          backend.url=${BACKEND_URL}
          backend.mock=false
          demo.username=${DEMO_USERNAME}
          demo.password=${DEMO_PASSWORD}
          EOF

      - name: Build WASM web app
        run: ./gradlew :webApp:wasmJsBrowserDistribution

      - name: Upload web artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lmu-assister-web
          path: webApp/build/dist/wasmJs/productionExecutable/
          if-no-files-found: error
          retention-days: 7
