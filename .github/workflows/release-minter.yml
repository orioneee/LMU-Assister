name: Release Minter

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            archive: tar.gz
            package-script: scripts/ci/package_minter_unix.sh
          - os: macos-13
            platform: macos-x64
            archive: zip
            package-script: scripts/ci/package_minter_unix.sh
          - os: macos-14
            platform: macos-arm64
            archive: zip
            package-script: scripts/ci/package_minter_unix.sh
          - os: windows-latest
            platform: windows-x64
            archive: zip
            package-script: scripts/ci/package_minter_windows.ps1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build minter distribution
        run: ./gradlew :jvm-minter:installDist

      - name: Package minter
        if: runner.os != 'Windows'
        run: bash ${{ matrix.package-script }} ${{ matrix.platform }} ${{ matrix.archive }}

      - name: Package minter
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\${{ matrix.package-script }} -Platform ${{ matrix.platform }} -Archive ${{ matrix.archive }}

      - name: Upload minter artifact
        uses: actions/upload-artifact@v4
        with:
          name: lmu-minter-${{ matrix.platform }}
          path: build/minter-release/lmu-minter-${{ matrix.platform }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download minter artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* \
              --title "LMU Assister Minter $TAG" \
              --notes "Bundled JVM minter builds for LMU Assister."
          fi
